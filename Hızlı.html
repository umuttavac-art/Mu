<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Modern Yılan Oyunu</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
        }
        h1 {
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            font-size: 2rem;
        }

        /* Meyve Özellik Paneli */
        #legendContainer {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 12px;
            max-width: 95%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .legend-item {
            display: inline-block;
            margin: 2px 6px;
        }
        
        /* Menü Tasarımı */
        #menuContainer {
            background: rgba(0, 0, 0, 0.75);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            max-width: 90%;
            width: 350px;
            margin-top: 30px;
        }
        #menuContainer h2 {
            margin-top: 0;
            color: #99f2c8;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: linear-gradient(135deg, #38ef7d, #11998e);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }
        
        /* Oyun Alanı Tasarımı */
        #gameContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .score-board {
            font-size: 18px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        canvas {
            background-color: #1e1e1e;
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        
        /* ERGONOMİK VE SIĞAN Dairesel Kontrol Paneli */
        .joystick-controls {
            margin-top: 15px;
            margin-bottom: 25px; /* Alt kısımdan boşluk bırakarak sığmasını sağladık */
            position: relative;
            width: 230px; 
            height: 230px; 
            background: rgba(0, 0, 0, 0.45);
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .j-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.25); 
            border: 2px solid rgba(255,255,255,0.7);
            color: white;
            font-size: 34px; 
            width: 66px; 
            height: 66px; 
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }
        .j-btn:active {
            background: #38ef7d;
            color: #1f4037;
            transform: scale(0.92);
            box-shadow: 0 0 20px #38ef7d;
        }
        
        /* Buton konumları taşma yapmayacak şekilde içe doğru optimize edildi */
        #j-up { top: 5px; left: 82px; }
        #j-left { top: 82px; left: 5px; }
        #j-right { top: 82px; right: 5px; }
        #j-down { bottom: 5px; left: 82px; } /* Alt ok panelin tamamen içine çekildi */
        
        .center-dot {
            position: absolute;
            top: 95px;
            left: 95px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <h1>Yılan Oyunu</h1>

    <!-- ÖZELLİK KILAVUZU PANELİ -->
    <div id="legendContainer">
        <div class="legend-item"><span style="color:#ff3f34">●</span> Çilek: Mega Büyüme (+10 boğum, +3 Skor)</div> 
        <div class="legend-item"><span style="color:#f1c40f">●</span> Muz: Turbo Hız (+2 Skor)</div> 
        <div class="legend-item"><span style="color:#2980b9">●</span> Yaban Mersini: Süper Yavaş (+1 Skor)</div> 
        <div class="legend-item"><span style="color:#ffd700">●</span> Altın Elma: Sıfır Büyüme (+5 Skor)</div>
    </div>

    <!-- GİRİŞ MENÜSÜ -->
    <div id="menuContainer">
        <h2>Harita Boyutu Seçin</h2>
        <button class="menu-btn" onclick="startGame('KUCUK')">Küçük (300 x 300)</button>
        <button class="menu-btn" onclick="startGame('ORTA')">Orta (450 x 450)</button>
        <button class="menu-btn" onclick="startGame('BUYUK')">Büyük (600 x 600)</button>
    </div>

    <!-- OYUN ALANI -->
    <div id="gameContainer">
        <div class="score-board">Skor: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>

        <!-- YENİLENEN Kontrol Paneli -->
        <div class="joystick-controls">
            <div class="center-dot"></div>
            <button class="j-btn" id="j-up" onclick="changeDirection('UP')">↑</button>
            <button class="j-btn" id="j-left" onclick="changeDirection('LEFT')">←</button>
            <button class="j-btn" id="j-right" onclick="changeDirection('RIGHT')">→</button>
            <button class="j-btn" id="j-down" onclick="changeDirection('DOWN')">↓</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun ayarları
        const snakeRadius = 10; 
        let speed = 1.8; 
        let score = 0;
        let isGameOver = false;
        let gameStarted = false;

        let snake = [];
        let foods = []; 
        const maxFoods = 5; 
        let currentDir = null;
        let nextDir = null;

        const fruits = [
            { name: 'cilek', color: '#ff3f34', leaf: '#05c46b', size: 16, scoreBonus: 3, growBonus: 10, speedEffect: 1.8 },
            { name: 'muz', color: '#f1c40f', leaf: '#d35400', size: 11, scoreBonus: 2, growBonus: 3, speedEffect: 3.2 }, 
            { name: 'yabanmersini', color: '#2980b9', leaf: '#27ae60', size: 10, scoreBonus: 1, growBonus: 2, speedEffect: 1.1 }, 
            { name: 'altinelma', color: '#ffd700', leaf: '#ff9f43', size: 14, scoreBonus: 5, growBonus: 0, speedEffect: 1.8 } 
        ];

        function startGame(size) {
            if (size === 'KUCUK') {
                canvas.width = 300;
                canvas.height = 300;
            } else if (size === 'ORTA') {
                canvas.width = 450;
                canvas.height = 450;
            } else if (size === 'BUYUK') {
                canvas.width = 600;
                canvas.height = 600;
            }

            document.getElementById("menuContainer").style.display = "none";
            document.getElementById("legendContainer").style.display = "block";
            document.getElementById("gameContainer").style.display = "flex";
            
            snake = [];
            let startX = canvas.width / 2;
            let startY = canvas.height / 2;
            for (let i = 0; i < 5; i++) {
                snake.push({ x: startX - i * (snakeRadius * 1.5), y: startY });
            }

            for(let i=0; i < maxFoods; i++){
                spawnSingleFood();
            }
            
            gameStarted = true;
            requestAnimationFrame(gameLoop);
        }

        // Klavye ve dokunmatik kontroller
        document.addEventListener("keydown", (e) => {
            if (!gameStarted) return;
            if (e.keyCode == 37 && currentDir != "RIGHT") nextDir = "LEFT";
            else if (e.keyCode == 38 && currentDir != "DOWN") nextDir = "UP";
            else if (e.keyCode == 39 && currentDir != "LEFT") nextDir = "RIGHT";
            else if (e.keyCode == 40 && currentDir != "UP") nextDir = "DOWN";
        });

        function changeDirection(dir) {
            if (!gameStarted) return;
            if (dir == 'LEFT' && currentDir != "RIGHT") nextDir = "LEFT";
            else if (dir == 'UP' && currentDir != "DOWN") nextDir = "UP";
            else if (dir == 'RIGHT' && currentDir != "LEFT") nextDir = "RIGHT";
            else if (dir == 'DOWN' && currentDir != "UP") nextDir = "DOWN";
        }

        function spawnSingleFood() {
            let fX = Math.random() * (canvas.width - 40) + 20;
            let fY = Math.random() * (canvas.height - 40) + 20;
            const randomFruit = fruits[Math.floor(Math.random() * fruits.length)];
            foods.push({ x: fX, y: fY, type: randomFruit });
        }

        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }

        function gameLoop() {
            if (isGameOver || !gameStarted) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=25) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            foods.forEach(food => {
                ctx.fillStyle = food.type.color;
                ctx.beginPath();
                if(food.type.name === 'muz') {
                    ctx.ellipse(food.x, food.y, food.type.size + 5, food.type.size, Math.PI / 4, 0, Math.PI * 2);
                } else if(food.type.name === 'altinelma') {
                    ctx.strokeStyle = "rgba(255, 215, 0, 0.4)";
                    ctx.lineWidth = 3;
                    ctx.arc(food.x, food.y, food.type.size + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.arc(food.x, food.y, food.type.size, 0, Math.PI * 2);
                } else {
                    ctx.arc(food.x, food.y, food.type.size, 0, Math.PI * 2);
                }
                ctx.fill();

                ctx.fillStyle = food.type.leaf;
                ctx.beginPath();
                ctx.arc(food.x + 3, food.y - food.type.size, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            if (nextDir !== null) currentDir = nextDir;

            if (currentDir !== null) {
                let head = { x: snake[0].x, y: snake[0].y };

                if (currentDir == "LEFT") head.x -= speed;
                if (currentDir == "RIGHT") head.x += speed;
                if (currentDir == "UP") head.y -= speed;
                if (currentDir == "DOWN") head.y += speed;

                snake[0].x = head.x;
                snake[0].y = head.y;

                for (let i = 1; i < snake.length; i++) {
                    let targetX = snake[i-1].x;
                    let targetY = snake[i-1].y;
                    let dist = getDistance(snake[i].x, snake[i].y, targetX, targetY);
                    
                    let idealDist = snakeRadius * 1.2; 
                    if (dist > idealDist) {
                        let angle = Math.atan2(targetY - snake[i].y, targetX - snake[i].x);
                        snake[i].x = targetX - Math.cos(angle) * idealDist;
                        snake[i].y = targetY - Math.sin(angle) * idealDist;
                    }
                }

                if (head.x < 0 || head.x > canvas.width || head.y < 0 || head.y > canvas.height) {
                    gameOver();
                    return;
                }

                for (let i = 35; i < snake.length; i++) {
                    if (getDistance(head.x, head.y, snake[i].x, snake[i].y) < snakeRadius * 0.7) {
                        gameOver();
                        return;
                    }
                }

                for (let i = 0; i < foods.length; i++) {
                    let currentFood = foods[i];
                    if (getDistance(head.x, head.y, currentFood.x, currentFood.y) < snakeRadius + currentFood.type.size) {
                        score += currentFood.type.scoreBonus;
                        document.getElementById("score").innerText = score;
                        speed = currentFood.type.speedEffect;

                        if (currentFood.type.growBonus > 0) {
                            let lastPart = snake[snake.length - 1];
                            for(let k = 0; k < currentFood.type.growBonus; k++) {
                                snake.push({ x: lastPart.x, y: lastPart.y });
                            }
                        }

                        foods.splice(i, 1);
                        spawnSingleFood();
                        break; 
                    }
                }
            }

            // Yılanı Çiz
            for (let i = snake.length - 1; i >= 0; i--) {
                ctx.beginPath();
                if (i == 0) {
                    ctx.fillStyle = "#2ecc71";
                    ctx.arc(snake[i].x, snake[i].y, snakeRadius + 2, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "white";
                    let eyeX1 = snake[i].x, eyeY1 = snake[i].y;
                    let eyeX2 = snake[i].x, eyeY2 = snake[i].y;
                    
                    if(currentDir == "LEFT" || currentDir === null) {
                        eyeX1 -= 4; eyeY1 -= 4; eyeX2 -= 4; eyeY2 += 4;
                    } else if(currentDir == "RIGHT") {
                        eyeX1 += 4; eyeY1 -= 4; eyeX2 += 4; eyeY2 += 4;
                    } else if(currentDir == "UP") {
                        eyeX1 -= 4; eyeY1 -= 4; eyeX2 += 4; eyeY2 -= 4;
                    } else if(currentDir == "DOWN") {
                        eyeX1 -= 4; eyeY1 += 4; eyeX2 += 4; eyeY2 += 4;
                    }
                    
                    ctx.beginPath(); ctx.arc(eyeX1, eyeY1, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeX2, eyeY2, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "black";
                    ctx.beginPath(); ctx.arc(eyeX1, eyeY1, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeX2, eyeY2, 1.5, 0, Math.PI*2); ctx.fill();

                } else {
                    ctx.fillStyle = i % 2 == 0 ? "#27ae60" : "#219a52";
                    ctx.arc(snake[i].x, snake[i].y, snakeRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isGameOver = true;
            alert("Oyun Bitti! Toplam Skorun: " + score);
            location.reload();
        }
    </script>
</body>
</html>
